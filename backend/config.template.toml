# Configuration template for myaiagent backend
# Copy to .env or load via your own config manager.

[app]
APP_NAME = "AI Agent Builder"
APP_VERSION = "0.2.0"
DEBUG = false
HOST = "0.0.0.0"
PORT = 8000
CORS_ORIGINS = "*"

[database]
POSTGRES_USER = "langgraph"
POSTGRES_PASSWORD = "langgraph_password"
POSTGRES_HOST = "localhost"
POSTGRES_PORT = 5432
POSTGRES_DB = "agent_state"

[redis]
REDIS_HOST = "localhost"
REDIS_PORT = 6379
REDIS_DB = 0

[llm]
DEFAULT_LLM_PROVIDER = "groq"
DEFAULT_LLM_MODEL = "groq/llama-3.3-70b-versatile"
GROQ_API_KEY = ""
GROQ_API_BASE_URL = "https://api.groq.com/openai/v1"
OPENAI_API_KEY = ""
OPENAI_API_BASE_URL = "https://api.openai.com/v1"
ANTHROPIC_API_KEY = ""
ANTHROPIC_API_BASE_URL = "https://api.anthropic.com/v1"
ANTHROPIC_API_VERSION = "2023-06-01"
OLLAMA_BASE_URL = "http://localhost:11434"

[sandbox]
SANDBOX_IMAGE = "agent-sandbox:latest"
SANDBOX_MEM_LIMIT = "512m"
SANDBOX_CPU_QUOTA = 50000
SANDBOX_TIMEOUT = 30

[secrets]
# Generate a key:
# python - <<'PY'
# from cryptography.fernet import Fernet
# print(Fernet.generate_key().decode())
# PY
SECRETS_FERNET_KEY = ""
SECRETS_TEST_TIMEOUT = 5
API_AUTH_TOKEN = ""

[langsmith]
LANGCHAIN_TRACING_V2 = false
LANGCHAIN_API_KEY = ""
LANGCHAIN_PROJECT = "ai-agent-builder"
LANGCHAIN_ENDPOINT = "https://api.smith.langchain.com"
